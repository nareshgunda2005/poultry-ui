{% extends 'base.html' %}
{% block title %}Add Expense - Poultry Manager{% endblock %}
{% block content %}
<h2 class="mb-3">Add Expense</h2>
<form method="post" class="row g-3">
  <div class="col-md-4">
    <label class="form-label">Date</label>
    <input type="date" class="form-control" name="record_date" required>
  </div>
  <div class="col-md-4">
    <label class="form-label">Category</label>
    <select class="form-select" name="category">
      <option value="feed">Feed</option>
      <option value="medicine">Medicine</option>
      <option value="labor">Labor</option>
      <option value="utilities">Utilities</option>
      <option value="maintenance">Maintenance</option>
      <option value="misc">Misc</option>
    </select>
  </div>
  <div class="col-md-4">
    <label class="form-label">Amount</label>
    <input type="number" class="form-control" name="amount" min="0" step="0.01" value="0">
  </div>
  <div class="col-12">
    <label class="form-label">Notes</label>
    <input type="text" class="form-control" name="notes" placeholder="Optional">
  </div>
  <div class="col-12">
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('expenses_list') }}" class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
